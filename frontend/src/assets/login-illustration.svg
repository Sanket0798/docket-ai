<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 420" fill="none">
  <!-- Desk -->
  <rect x="60" y="340" width="380" height="12" rx="6" fill="#E2E0F0"/>
  <rect x="100" y="352" width="12" height="40" rx="4" fill="#C9C5E0"/>
  <rect x="388" y="352" width="12" height="40" rx="4" fill="#C9C5E0"/>

  <!-- Monitor stand -->
  <rect x="228" y="295" width="44" height="48" rx="4" fill="#C9C5E0"/>
  <rect x="200" y="338" width="100" height="8" rx="4" fill="#B8B3D4"/>

  <!-- Monitor -->
  <rect x="100" y="100" width="300" height="200" rx="12" fill="#2D2B55"/>
  <rect x="112" y="112" width="276" height="176" rx="8" fill="#1A1840"/>

  <!-- Screen content - browser bar -->
  <rect x="112" y="112" width="276" height="24" rx="8" fill="#252350"/>
  <circle cx="128" cy="124" r="5" fill="#FF6B6B"/>
  <circle cx="144" cy="124" r="5" fill="#FFD93D"/>
  <circle cx="160" cy="124" r="5" fill="#6BCB77"/>

  <!-- Screen content - login form mockup -->
  <rect x="160" y="155" width="180" height="14" rx="4" fill="#3D3A6B"/>
  <rect x="160" y="178" width="180" height="28" rx="6" fill="#2D2B55" stroke="#4A4780" stroke-width="1.5"/>
  <rect x="160" y="216" width="180" height="28" rx="6" fill="#2D2B55" stroke="#4A4780" stroke-width="1.5"/>
  <rect x="160" y="255" width="180" height="28" rx="6" fill="#6C63FF"/>
  <rect x="168" y="186" width="80" height="6" rx="3" fill="#4A4780"/>
  <rect x="168" y="224" width="60" height="6" rx="3" fill="#4A4780"/>
  <text x="220" y="274" text-anchor="middle" fill="white" font-size="11" font-family="Inter,sans-serif" font-weight="600">Sign In</text>

  <!-- Keyboard -->
  <rect x="130" y="348" width="240" height="14" rx="4" fill="#D4D0E8"/>
  <rect x="138" y="352" width="16" height="6" rx="2" fill="#B8B3D4"/>
  <rect x="160" y="352" width="16" height="6" rx="2" fill="#B8B3D4"/>
  <rect x="182" y="352" width="16" height="6" rx="2" fill="#B8B3D4"/>
  <rect x="204" y="352" width="16" height="6" rx="2" fill="#B8B3D4"/>
  <rect x="226" y="352" width="16" height="6" rx="2" fill="#B8B3D4"/>
  <rect x="248" y="352" width="16" height="6" rx="2" fill="#B8B3D4"/>
  <rect x="270" y="352" width="16" height="6" rx="2" fill="#B8B3D4"/>
  <rect x="292" y="352" width="16" height="6" rx="2" fill="#B8B3D4"/>
  <rect x="314" y="352" width="46" height="6" rx="2" fill="#B8B3D4"/>

  <!-- Mouse -->
  <rect x="390" y="340" width="28" height="38" rx="14" fill="#D4D0E8"/>
  <line x1="404" y1="340" x2="404" y2="360" stroke="#B8B3D4" stroke-width="1.5"/>

  <!-- Character - body -->
  <ellipse cx="120" cy="370" rx="45" ry="8" fill="#E2E0F0" opacity="0.5"/>
  <!-- legs -->
  <rect x="100" y="310" width="14" height="55" rx="7" fill="#FFB347"/>
  <rect x="122" y="310" width="14" height="55" rx="7" fill="#FFB347"/>
  <!-- shoes -->
  <ellipse cx="107" cy="365" rx="12" ry="6" fill="#2D2B55"/>
  <ellipse cx="129" cy="365" rx="12" ry="6" fill="#2D2B55"/>
  <!-- torso -->
  <rect x="90" y="230" width="60" height="85" rx="20" fill="#6C63FF"/>
  <!-- arm left -->
  <rect x="68" y="240" width="26" height="12" rx="6" fill="#6C63FF"/>
  <rect x="56" y="248" width="18" height="10" rx="5" fill="#FDBCB4"/>
  <!-- arm right - pointing at screen -->
  <rect x="148" y="235" width="40" height="12" rx="6" fill="#6C63FF"/>
  <rect x="184" y="230" width="14" height="10" rx="5" fill="#FDBCB4"/>
  <!-- neck -->
  <rect x="108" y="215" width="20" height="20" rx="8" fill="#FDBCB4"/>
  <!-- head -->
  <ellipse cx="118" cy="200" rx="28" ry="28" fill="#FDBCB4"/>
  <!-- hair -->
  <ellipse cx="118" cy="178" rx="28" ry="14" fill="#2D2B55"/>
  <rect x="90" y="178" width="56" height="14" rx="0" fill="#2D2B55"/>
  <!-- eyes -->
  <circle cx="109" cy="198" r="4" fill="white"/>
  <circle cx="127" cy="198" r="4" fill="white"/>
  <circle cx="110" cy="199" r="2.5" fill="#2D2B55"/>
  <circle cx="128" cy="199" r="2.5" fill="#2D2B55"/>
  <!-- smile -->
  <path d="M110 210 Q118 216 126 210" stroke="#2D2B55" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Plant decoration -->
  <rect x="400" y="310" width="16" height="32" rx="4" fill="#8B7355"/>
  <ellipse cx="408" cy="308" rx="18" ry="22" fill="#4CAF50"/>
  <ellipse cx="396" cy="295" rx="12" ry="16" fill="#66BB6A"/>
  <ellipse cx="420" cy="295" rx="12" ry="16" fill="#66BB6A"/>

  <!-- Floating elements -->
  <rect x="30" y="150" width="40" height="30" rx="6" fill="#6C63FF" opacity="0.15"/>
  <rect x="35" y="158" width="30" height="4" rx="2" fill="#6C63FF" opacity="0.4"/>
  <rect x="35" y="166" width="20" height="4" rx="2" fill="#6C63FF" opacity="0.4"/>

  <rect x="430" y="130" width="40" height="30" rx="6" fill="#FF6B6B" opacity="0.15"/>
  <rect x="435" y="138" width="30" height="4" rx="2" fill="#FF6B6B" opacity="0.4"/>
  <rect x="435" y="146" width="20" height="4" rx="2" fill="#FF6B6B" opacity="0.4"/>

  <!-- Lock icon floating -->
  <circle cx="450" cy="220" r="16" fill="#6C63FF" opacity="0.12"/>
  <rect x="444" y="218" width="12" height="10" rx="2" fill="#6C63FF" opacity="0.5"/>
  <path d="M446 218 v-4 a4 4 0 0 1 8 0 v4" stroke="#6C63FF" stroke-width="2" fill="none" opacity="0.5"/>

  <!-- Stars/sparkles -->
  <circle cx="70" cy="80" r="3" fill="#FFD93D" opacity="0.7"/>
  <circle cx="440" cy="80" r="3" fill="#FFD93D" opacity="0.7"/>
  <circle cx="460" cy="300" r="2" fill="#6C63FF" opacity="0.5"/>
  <circle cx="40" cy="280" r="2" fill="#FF6B6B" opacity="0.5"/>
</svg>
